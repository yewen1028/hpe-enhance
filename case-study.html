<head>

    content="Real-world IT outcomes delivered by HPE Solutions Sdn Bhd for clients across Malaysia — managed services, deployments, helpdesk, staffing, warranty and sourcing." />

  <style>
    :root {
      --orange: #f47920;
      --orange-d: #d9631a;
      --orange-l: #fdeee2;
      --navy: #0d1b2a;
      --navy-2: #16283e;
      --text: #1f2a37;
      --muted: #5b6b7c;
      --light: #f6f8fb;
      --border: #e6ebf1;
      --radius: 16px;
      --shadow: 0 24px 60px -22px rgba(13, 27, 42, .28);
      --nav-h: 68px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      color: var(--text);
      background: #fff;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; }

    img { max-width: 100%; display: block; }

    ::selection { background: var(--orange); color: #fff; }

    .wrap { width: min(1120px, calc(100% - 40px)); margin-inline: auto; }

    /* ─────────────────────────  NAV  ───────────────────────── */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      display: flex; align-items: center;
      background: rgba(255, 255, 255, .86);
      backdrop-filter: saturate(160%) blur(14px);
      -webkit-backdrop-filter: saturate(160%) blur(14px);
      border-bottom: 1px solid var(--border);
    }
    nav .wrap { display: flex; align-items: center; justify-content: space-between; gap: 18px; }
    .nav-logo { display: flex; align-items: center; gap: 10px; }
    .nav-logo img { height: 34px; width: auto; }
    .nav-logo .lg-fallback {
      display: none; align-items: center; gap: 8px; font-weight: 800; font-size: 17px; color: var(--orange);
    }
    .nav-logo .lg-fallback b {
      background: var(--orange); color: #fff; padding: 4px 9px; border-radius: 6px; font-size: 13px;
    }
    .nav-right { display: flex; align-items: center; gap: 8px; }
    .nav-back {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 15px; border-radius: 9px; font-size: 14px; font-weight: 600; color: var(--muted);
      transition: background .18s, color .18s;
    }
    .nav-back:hover { background: var(--light); color: var(--navy); }
    .nav-cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 20px; border-radius: 9px; font-size: 14px; font-weight: 700;
      background: var(--orange); color: #fff;
      box-shadow: 0 6px 16px -6px rgba(244, 121, 32, .6);
      transition: transform .16s, box-shadow .2s, background .2s;
    }
    .nav-cta:hover { background: var(--orange-d); transform: translateY(-2px); box-shadow: 0 10px 22px -8px rgba(244, 121, 32, .7); }
    .nav-cta:active { transform: translateY(0); }

    /* ─────────────────────────  HERO (shared)  ───────────────────────── */
    .hero {
      position: relative;
      background: var(--navy);
      color: #fff;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background-size: cover; background-position: center;
      opacity: .34; transform: scale(1.06);
    }
    .hero::after {
      content: ''; position: absolute; inset: 0; z-index: 1;
      background:
        linear-gradient(180deg, rgba(13, 27, 42, .55) 0%, rgba(13, 27, 42, .82) 62%, rgba(13, 27, 42, .97) 100%),
        radial-gradient(1200px 460px at 82% -8%, rgba(244, 121, 32, .28), transparent 62%);
    }
    .hero .wrap { position: relative; z-index: 2; }

    /* Breadcrumb */
    .crumb {
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
      font-size: 13px; font-weight: 600; letter-spacing: .01em;
      color: rgba(255, 255, 255, .62);
    }
    .crumb a { transition: color .16s; }
    .crumb a:hover { color: var(--orange); }
    .crumb i { font-size: 9px; opacity: .55; }
    .crumb .here { color: #fff; }

    /* ─────────────────────────  DETAIL HERO  ───────────────────────── */
    .d-hero .wrap { padding: 30px 0 clamp(48px, 7vw, 78px); }
    .d-tag {
      display: inline-flex; align-items: center; gap: 9px; margin: 26px 0 18px;
      padding: 7px 15px 7px 11px; border-radius: 999px;
      background: rgba(244, 121, 32, .16); border: 1px solid rgba(244, 121, 32, .4);
      color: #ffd7b4; font-size: 12.5px; font-weight: 700; letter-spacing: .02em;
    }
    .d-tag i { color: var(--orange); }
    .d-title {
      font-size: clamp(31px, 5vw, 52px); line-height: 1.04; font-weight: 800;
      letter-spacing: -.02em; max-width: 20ch;
    }
    .d-lead {
      margin-top: 20px; max-width: 66ch; font-size: clamp(15.5px, 1.6vw, 18px);
      color: rgba(255, 255, 255, .82); line-height: 1.62;
    }

    /* Metrics band */
    .d-metrics {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px;
      margin-top: 34px;
    }
    .d-metric {
      background: rgba(255, 255, 255, .05); border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 13px; padding: 18px 18px 16px;
      backdrop-filter: blur(4px);
    }
    .d-metric .v {
      display: block; font-size: clamp(22px, 3vw, 30px); font-weight: 800; color: #fff; letter-spacing: -.01em;
    }
    .d-metric .l {
      display: block; margin-top: 4px; font-size: 12.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .06em; color: rgba(255, 255, 255, .58);
    }

    /* ─────────────────────────  DETAIL BODY  ───────────────────────── */
    .d-body { padding: clamp(46px, 6vw, 76px) 0 20px; }
    .two-col {
      display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;
    }
    .panel {
      background: #fff; border: 1px solid var(--border); border-radius: var(--radius);
      padding: 28px 28px 26px; box-shadow: var(--shadow);
    }
    .panel.tinted { background: linear-gradient(180deg, #fff, var(--light)); }
    .p-label {
      display: inline-flex; align-items: center; gap: 10px; margin-bottom: 14px;
      font-size: 12.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .07em;
      color: var(--navy);
    }
    .p-label i {
      width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
      background: var(--orange-l); color: var(--orange); font-size: 13px;
    }
    .panel p { color: var(--muted); font-size: 15.5px; }

    /* Solution list */
    .sol-list { list-style: none; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 26px; }
    .sol-list li {
      position: relative; padding-left: 30px; font-size: 15px; color: var(--text); line-height: 1.5;
    }
    .sol-list li i {
      position: absolute; left: 0; top: 3px;
      width: 20px; height: 20px; border-radius: 6px; display: grid; place-items: center;
      background: var(--orange-l); color: var(--orange); font-size: 9px;
    }

    /* Scope chips */
    .scope-chips { display: flex; flex-wrap: wrap; gap: 9px; }
    .chip {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 9px 15px; border-radius: 999px; font-size: 13.5px; font-weight: 600;
      background: var(--light); border: 1px solid var(--border); color: var(--navy);
    }
    .chip i { color: var(--orange); font-size: 11px; }

    /* Related service CTA band */
    .cta-band {
      margin-top: 8px;
      background: linear-gradient(120deg, var(--navy) 0%, var(--navy-2) 100%);
      border-radius: var(--radius); color: #fff; overflow: hidden;
      display: grid; grid-template-columns: 1.4fr .9fr; align-items: center; gap: 24px;
      padding: 34px 34px; position: relative;
    }
    .cta-band::before {
      content: ''; position: absolute; right: -60px; top: -60px; width: 260px; height: 260px;
      background: radial-gradient(circle, rgba(244, 121, 32, .4), transparent 66%); pointer-events: none;
    }
    .cta-band .ct-eyebrow {
      font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: #ffd7b4;
    }
    .cta-band h3 { font-size: clamp(20px, 2.6vw, 26px); font-weight: 800; margin-top: 8px; letter-spacing: -.01em; }
    .cta-band p { color: rgba(255, 255, 255, .74); font-size: 14.5px; margin-top: 8px; max-width: 46ch; }
    .cta-band .ct-actions { display: flex; justify-content: flex-end; position: relative; z-index: 1; }
    .btn-quote {
      display: inline-flex; align-items: center; gap: 9px;
      padding: 14px 24px; border-radius: 11px; font-weight: 700; font-size: 15px;
      background: var(--orange); color: #fff;
      box-shadow: 0 10px 26px -10px rgba(244, 121, 32, .8);
      transition: transform .16s, box-shadow .2s, background .2s;
    }
    .btn-quote:hover { background: var(--orange-d); transform: translateY(-2px); box-shadow: 0 16px 32px -12px rgba(244, 121, 32, .9); }
    .btn-quote:active { transform: translateY(0); }

    /* Prev / next */
    .pager { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 40px 0 8px; }
    .pager a {
      display: flex; flex-direction: column; gap: 5px;
      padding: 20px 22px; border-radius: 13px; border: 1px solid var(--border); background: #fff;
      transition: border-color .18s, transform .18s, box-shadow .2s;
    }
    .pager a:hover { border-color: rgba(244, 121, 32, .5); transform: translateY(-2px); box-shadow: var(--shadow); }
    .pager .pg-k { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); display: flex; align-items: center; gap: 8px; }
    .pager .pg-k i { color: var(--orange); }
    .pager .pg-t { font-size: 15.5px; font-weight: 700; color: var(--navy); line-height: 1.35; }
    .pager a.next { text-align: right; }
    .pager a.next .pg-k { justify-content: flex-end; }
    .pager a.empty { visibility: hidden; }

    /* ─────────────────────────  INDEX VIEW  ───────────────────────── */
    .i-hero .wrap { padding: 44px 0 clamp(44px, 6vw, 66px); }
    .i-eyebrow { color: var(--orange); font-weight: 800; letter-spacing: .12em; text-transform: uppercase; font-size: 13px; margin-bottom: 14px; }
    .i-title { font-size: clamp(34px, 6vw, 60px); font-weight: 800; letter-spacing: -.025em; line-height: 1.02; }
    .i-sub { margin-top: 18px; max-width: 58ch; font-size: clamp(15.5px, 1.6vw, 18px); color: rgba(255, 255, 255, .8); }
    .i-stats { display: flex; flex-wrap: wrap; gap: 30px; margin-top: 30px; }
    .i-stats .st .v { font-size: 28px; font-weight: 800; color: #fff; }
    .i-stats .st .l { font-size: 12.5px; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: rgba(255, 255, 255, .55); }

    .i-body { padding: clamp(46px, 6vw, 72px) 0 30px; background: var(--light); }
    .cat { margin-bottom: 48px; }
    .cat-head { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .cat-head .ci {
      width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center;
      background: var(--orange-l); color: var(--orange); font-size: 16px; flex-shrink: 0;
    }
    .cat-head h2 { font-size: clamp(19px, 2.4vw, 24px); font-weight: 800; color: var(--navy); letter-spacing: -.01em; }
    .cat-head .ccount { margin-left: auto; font-size: 13px; font-weight: 600; color: var(--muted); }

    .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
    .cs-card {
      position: relative; display: flex; flex-direction: column; overflow: hidden;
      border-radius: var(--radius); background: #fff; border: 1px solid var(--border);
      box-shadow: 0 10px 30px -18px rgba(13, 27, 42, .3);
      transition: transform .22s cubic-bezier(.22, 1, .36, 1), box-shadow .22s, border-color .22s;
    }
    .cs-card:hover { transform: translateY(-5px); box-shadow: 0 26px 50px -22px rgba(13, 27, 42, .42); border-color: rgba(244, 121, 32, .4); }
    .cs-thumb { position: relative; aspect-ratio: 16 / 9; background-size: cover; background-position: center; }
    .cs-thumb::after { content: ''; position: absolute; inset: 0; background: linear-gradient(180deg, rgba(13, 27, 42, .05), rgba(13, 27, 42, .5)); }
    .cs-thumb .ico {
      position: absolute; left: 14px; bottom: 14px; z-index: 1;
      width: 40px; height: 40px; border-radius: 11px; display: grid; place-items: center;
      background: rgba(255, 255, 255, .92); color: var(--orange); font-size: 16px;
      box-shadow: 0 6px 16px -6px rgba(0, 0, 0, .4);
    }
    .cs-info { padding: 18px 20px 20px; display: flex; flex-direction: column; flex: 1; }
    .cs-ind { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--orange); }
    .cs-info h3 { font-size: 17px; font-weight: 700; color: var(--navy); line-height: 1.3; margin: 7px 0 12px; }
    .cs-mets { display: flex; flex-wrap: wrap; gap: 7px; margin-top: auto; }
    .cs-mets span {
      font-size: 11.5px; font-weight: 600; padding: 5px 10px; border-radius: 7px;
      background: var(--light); color: var(--navy); border: 1px solid var(--border);
    }
    .cs-more {
      display: inline-flex; align-items: center; gap: 8px; margin-top: 15px;
      font-size: 13.5px; font-weight: 700; color: var(--orange);
    }
    .cs-more i { transition: transform .2s; }
    .cs-card:hover .cs-more i { transform: translateX(4px); }

    /* ─────────────────────────  FOOTER  ───────────────────────── */
    footer {
      background: var(--navy); color: rgba(255, 255, 255, .7); padding: 40px 0;
    }
    footer .wrap { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 18px; }
    footer .f-brand { display: flex; align-items: center; gap: 10px; font-weight: 800; color: #fff; }
    footer .f-brand b { background: var(--orange); color: #fff; padding: 4px 9px; border-radius: 6px; font-size: 13px; }
    footer .f-links { display: flex; flex-wrap: wrap; gap: 22px; font-size: 14px; font-weight: 600; }
    footer .f-links a:hover { color: var(--orange); }
    footer .f-copy { width: 100%; font-size: 12.5px; color: rgba(255, 255, 255, .4); border-top: 1px solid rgba(255, 255, 255, .1); padding-top: 18px; }

    /* ─────────────────────────  REVEAL  ───────────────────────── */
    .reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s cubic-bezier(.16, 1, .3, 1), transform .7s cubic-bezier(.16, 1, .3, 1); }
    .reveal.in { opacity: 1; transform: none; }

    /* ─────────────────────────  RESPONSIVE  ───────────────────────── */
    @media (max-width: 860px) {
      .two-col { grid-template-columns: 1fr; }
      .sol-list { grid-template-columns: 1fr; }
      .cta-band { grid-template-columns: 1fr; }
      .cta-band .ct-actions { justify-content: flex-start; }
    }
    @media (max-width: 560px) {
      .nav-back span { display: none; }
      .pager { grid-template-columns: 1fr; }
      .pager a.next { text-align: left; }
      .pager a.next .pg-k { justify-content: flex-start; }
      .pager a.empty { display: none; }
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .reveal { opacity: 1 !important; transform: none !important; transition: none !important; }
      .hero-bg { transform: none; }
    }

    /* ═══ DARK THEME — locked to match the main HPE site shell ═══ */
    :root {
      --base: #070c14;
      --orange: #ff7d1a; --orange-d: #e8670e; --orange-l: rgba(255, 125, 26, .13);
      --navy: #0a111d; --navy-2: #16233a;
      --text: #dbe3ee; --muted: #93a2b8; --heading: #f3f7fc;
      --light: #0d1626; --surface: #111c2e; --surface-2: #16233a;
      --border: rgba(255, 255, 255, .09);
      --shadow: 0 26px 60px -24px rgba(0, 0, 0, .65);
    }
    body { background: var(--base); color: var(--text); }
    nav { background: rgba(9, 15, 25, .72); border-bottom-color: var(--border); }
    .nav-back { color: var(--muted); }
    .nav-back:hover { background: var(--surface); color: var(--heading); }
    .panel { background: var(--surface); border-color: var(--border); }
    .panel.tinted { background: linear-gradient(180deg, var(--surface), var(--light)); }
    .panel p { color: var(--muted); }
    .p-label { color: var(--heading); }
    .p-label i { background: var(--orange-l); color: var(--orange); }
    .sol-list li { color: var(--text); }
    .sol-list li i { background: var(--orange-l); color: var(--orange); }
    .chip { background: var(--surface-2); border-color: var(--border); color: var(--text); }
    .cs-card { background: var(--surface); border-color: var(--border); }
    .cat-head h2 { color: var(--heading); }
    .cs-info h3 { color: var(--heading); }
    .cs-mets span { background: var(--surface-2); border-color: var(--border); color: var(--text); }
    .cs-thumb .ico { background: #101c2e; color: var(--orange); }
    .pager a { background: var(--surface); border-color: var(--border); }
    .pg-t { color: var(--heading); }
    footer { background: #060a11; }
  </style>
</head>

    /* Insertion order = navigation order for prev/next */
    var ORDER = Object.keys(CS);

      { svc: 'IT Helpdesk', icon: 'fa-headset' },

    ];

    /* ── small helpers ── */
    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function qp(name) { return new URLSearchParams(location.search).get(name); }

    /* ── Detail view ── */
    function renderDetail(id) {
      var d = CS[id];
      var i = ORDER.indexOf(id);
      var prev = i > 0 ? ORDER[i - 1] : null;
      var next = i < ORDER.length - 1 ? ORDER[i + 1] : null;

      var metrics = d.metrics.map(function (m) {
        return '<div class="d-metric reveal"><span class="v">' + esc(m.v) + '</span><span class="l">' + esc(m.l) + '</span></div>';
      }).join('');

      var sols = d.solution.map(function (s) {
        return '<li><i class="fa-solid fa-check"></i>' + esc(s) + '</li>';
      }).join('');

      var chips = d.scope.map(function (s) {
        return '<span class="chip"><i class="fa-solid fa-circle-check"></i>' + esc(s) + '</span>';
      }).join('');

      function pager(pid, dir) {
        if (!pid) return '<span class="pager-cell empty" aria-hidden="true"></span>';
        var pd = CS[pid];
        var kicker = dir === 'prev'
          ? '<div class="pg-k"><i class="fa-solid fa-arrow-left"></i> Previous case</div>'
          : '<div class="pg-k">Next case <i class="fa-solid fa-arrow-right"></i></div>';
        return '<a class="' + dir + '" href="case-study.html?case=' + pid + '">' + kicker +
          '<div class="pg-t">' + esc(pd.title) + '</div></a>';
      }

      document.getElementById('app').innerHTML =
        '<section class="hero d-hero">' +
          '<div class="hero-bg" style="background-image:url(' + img(d.img, 1600) + ')"></div>' +
          '<div class="wrap">' +
            '<div class="crumb">' +
              '<a href="hpe-enhanced-editing.html">Home</a><i class="fa-solid fa-chevron-right"></i>' +

              '<span class="here">' + esc(d.industry) + '</span>' +
            '</div>' +

          '</div>' +

          '<div class="panel reveal" style="margin-bottom:20px;"><div class="p-label"><i class="fa-solid fa-list-check"></i> Solution &amp; Scope of Work</div><ul class="sol-list">' + sols + '</ul></div>' +

          '<div class="panel reveal" style="margin-bottom:24px;"><div class="p-label"><i class="fa-solid fa-layer-group"></i> Coverage &amp; Technology Scope</div><div class="scope-chips">' + chips + '</div></div>' +

      var md = document.querySelector('meta[name="description"]');
      if (md) md.setAttribute('content', d.overview);

    function renderIndex() {
      var cats = GROUPS.map(function (g) {

      document.title = 'Case Studies — HPE Solutions Sdn Bhd';
    }

    /* ── Boot ── */
    (function () {
      var id = qp('case');
      if (id && CS[id]) renderDetail(id); else renderIndex();

      document.getElementById('yr').textContent = new Date().getFullYear();
      window.scrollTo(0, 0);

      /* Reveal on scroll (with safety net, matching the main site pattern) */
      var els = document.querySelectorAll('.reveal');
      if (!('IntersectionObserver' in window)) {
        els.forEach(function (el) { el.classList.add('in'); });
        return;
      }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); }
        });
      }, { threshold: .12, rootMargin: '0px 0px -8% 0px' });
      els.forEach(function (el) { io.observe(el); });
      setTimeout(function () { els.forEach(function (el) { el.classList.add('in'); }); }, 2600);
    })();
  </script>
