    .feat-card .fc-ico { width: 44px; height: 44px; border-radius: 11px; background: var(--orange-l); color: var(--orange); display: grid; place-items: center; font-size: 18px; margin-bottom: 14px; }

    .feat-card p { color: var(--muted); font-size: 14px; line-height: 1.55; }

    .ben-item i { color: var(--orange); margin-top: 3px; font-size: 15px; }
    .ben-item strong { color: var(--heading); display: block; font-size: 15px; font-weight: 700; }
    .ben-item span { color: var(--muted); font-size: 13.5px; }

      border-radius: var(--radius); color: #fff; overflow: hidden;
      display: grid; grid-template-columns: 1.4fr .9fr; align-items: center; gap: 24px;

    .cta-band::before { content: ''; position: absolute; right: -60px; top: -60px; width: 260px; height: 260px; background: radial-gradient(circle, rgba(244, 121, 32, .4), transparent 66%); pointer-events: none; }

    .svc-card:hover .svc-more i { transform: translateX(4px); }

    .reveal { opacity: 0; transform: translateY(22px); transition: opacity .7s cubic-bezier(.16, 1, .3, 1), transform .7s cubic-bezier(.16, 1, .3, 1); }

    @media (max-width: 860px) {

      .pager a.next { text-align: left; }
      .pager a.next .pg-k { justify-content: flex-start; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }

</head>

    var ORDER = Object.keys(SERVICES);

    /* per-service breadcrumb category (short label) */
    var SHORT = {
      managed: 'Managed Services', project: 'Project Deployment', helpdesk: 'IT Helpdesk',
      staffing: 'IT Staffing', warranty: 'Warranty', sourcing: 'Total Solution', vas: 'Value Added'
    };

    function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
    function qp(name) { return new URLSearchParams(location.search).get(name); }

    function renderDetail(key) {
      var s = SERVICES[key];
      var i = ORDER.indexOf(key);
      var prev = i > 0 ? ORDER[i - 1] : null;
      var next = i < ORDER.length - 1 ? ORDER[i + 1] : null;

      var feats = s.features.map(function (f) {
        return '<div class="feat-card reveal"><div class="fc-ico"><i class="fa-solid ' + f.icon + '"></i></div>' +
          '<h4>' + esc(f.title) + '</h4><p>' + esc(f.desc) + '</p></div>';
      }).join('');

      var slaHtml = '';
      if (s.sla && s.sla.length) {
        var slas = s.sla.map(function (t) {
          return '<div class="sla-card' + (t.highlight ? ' highlight' : '') + ' reveal">' +
            '<div class="tier">' + esc(t.tier) + '</div><div class="val">' + esc(t.val) + '</div>' +
            '<div class="desc">' + esc(t.desc) + '</div></div>';
        }).join('');
        slaHtml =
          '<div class="sec"><div class="sec-title"><span class="st-ico"><i class="fa-solid fa-gauge-high"></i></span>' +
          '<h2>Service Level Agreements</h2></div><div class="sla-grid">' + slas + '</div></div>';
      }

      var bens = s.benefits.map(function (b) {
        return '<div class="ben-item"><i class="fa-solid fa-circle-check"></i><div><strong>' + esc(b.title) +
          '</strong><span>' + esc(b.desc) + '</span></div></div>';
      }).join('');

      function pager(pk, dir) {
        if (!pk) return '<span class="pager-cell empty" aria-hidden="true"></span>';
        var ps = SERVICES[pk];
        var kicker = dir === 'prev'
          ? '<div class="pg-k"><i class="fa-solid fa-arrow-left"></i> Previous service</div>'
          : '<div class="pg-k">Next service <i class="fa-solid fa-arrow-right"></i></div>';
        return '<a class="' + dir + '" href="services.html?service=' + pk + '">' + kicker +
          '<div class="pg-t">' + esc(ps.title) + '</div></a>';
      }

      document.getElementById('app').innerHTML =
        '<section class="hero d-hero">' +
          '<div class="hero-bg" style="background-image:url(' + s.img + ')"></div>' +
          '<div class="wrap">' +
            '<div class="crumb"><a href="hpe-enhanced-editing.html">Home</a><i class="fa-solid fa-chevron-right"></i>' +
              '<a href="services.html">Services</a><i class="fa-solid fa-chevron-right"></i>' +
              '<span class="here">' + esc(SHORT[key] || s.title) + '</span></div>' +
            '<div class="d-tag">' + s.icon + ' Service</div>' +
            '<h1 class="d-title">' + esc(s.title) + '</h1>' +
            '<p class="d-lead">' + esc(s.desc) + '</p>' +
            '<div class="hero-cta"><a class="btn-quote" href="hpe-enhanced-editing.html#contact"><i class="fa-solid fa-paper-plane"></i> Talk to our team</a></div>' +
          '</div>' +
        '</section>' +

        '<section class="d-body"><div class="wrap">' +
          '<div class="sec"><div class="sec-title"><span class="st-ico"><i class="fa-solid fa-list-check"></i></span>' +
            '<h2>' + esc(s.featuresTitle) + '</h2></div><div class="feat-grid">' + feats + '</div></div>' +
          slaHtml +
          '<div class="sec"><div class="sec-title"><span class="st-ico"><i class="fa-solid fa-star"></i></span>' +
            '<h2>Key Benefits</h2></div><div class="ben-list">' + bens + '</div></div>' +

          '<div class="cta-band reveal">' +
            '<div><div class="ct-eyebrow">Get started</div>' +
              '<h3>Interested in ' + esc(s.title) + '?</h3>' +
              '<p>Speak to our team about a tailored engagement. No commitment required, fast nationwide mobilisation.</p></div>' +
            '<div class="ct-actions"><a class="btn-quote" href="hpe-enhanced-editing.html#contact"><i class="fa-solid fa-paper-plane"></i> Get a Quote</a></div>' +
          '</div>' +

          '<div class="pager">' + pager(prev, 'prev') + pager(next, 'next') + '</div>' +
        '</div></section>';

      document.title = s.title + ' — HPE Solutions';
      var md = document.querySelector('meta[name="description"]');
      if (md) md.setAttribute('content', s.desc);
    }

    function renderIndex() {
      var cards = ORDER.map(function (key) {
        var s = SERVICES[key];
        return '<a class="svc-card reveal" href="services.html?service=' + key + '">' +
          '<div class="svc-thumb" style="background-image:url(' + s.img + ')"><span class="ico">' + s.icon + '</span></div>' +
          '<div class="svc-info"><h3>' + esc(s.title) + '</h3><p>' + esc(s.desc) + '</p>' +
          '<span class="svc-more">View service <i class="fa-solid fa-arrow-right"></i></span></div></a>';
      }).join('');

      document.getElementById('app').innerHTML =
        '<section class="hero i-hero">' +
          '<div class="hero-bg" style="background-image:url(https://images.pexels.com/photos/1148820/pexels-photo-1148820.jpeg?auto=compress&cs=tinysrgb&w=1600)"></div>' +
          '<div class="wrap">' +
            '<div class="i-eyebrow">What we do</div>' +
            '<h1 class="i-title">IT services,<br>delivered nationwide.</h1>' +
            '<p class="i-sub">From SLA-backed managed support to large-scale deployments, helpdesk, staffing, warranty and total IT sourcing — one accountable partner across Malaysia.</p>' +
            '<div class="i-stats">' +
              '<div class="st"><div class="v">7</div><div class="l">Service lines</div></div>' +
              '<div class="st"><div class="v">18</div><div class="l">Service centres</div></div>' +
              '<div class="st"><div class="v">24×7</div><div class="l">SLA options</div></div>' +
            '</div>' +
          '</div>' +
        '</section>' +
        '<section class="i-body"><div class="wrap"><div class="svc-grid">' + cards + '</div></div></section>';

      document.title = 'Services — HPE Solutions Sdn Bhd';
    }

    (function () {
      var key = qp('service');
      if (key && SERVICES[key]) renderDetail(key); else renderIndex();

      document.getElementById('yr').textContent = new Date().getFullYear();
      window.scrollTo(0, 0);

      var els = document.querySelectorAll('.reveal');
      if (!('IntersectionObserver' in window)) { els.forEach(function (el) { el.classList.add('in'); }); return; }
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });
      }, { threshold: .12, rootMargin: '0px 0px -8% 0px' });
      els.forEach(function (el) { io.observe(el); });
      setTimeout(function () { els.forEach(function (el) { el.classList.add('in'); }); }, 2600);
    })();
  </script>
